{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-6">

        <div class="card shadow border-0 rounded-3">
            <div class="card-body p-4">

                <h4 class="fw-bold mb-4">
                    Submit Report
                </h4>

<form method="POST">

    <!-- Date -->
    <div class="mb-3">
        <label class="form-label fw-semibold">
            Date
        </label>
        <input type="date"
               name="date"
               required
               class="form-control shadow-sm">
    </div>

    <!-- Work -->
    <div class="mb-3">
        <label class="form-label fw-semibold">
            Work Done
        </label>
        <textarea name="work"
                  rows="4"
                  required
                  class="form-control shadow-sm"
                  placeholder="Enter work details..."></textarea>
    </div>

    <!-- Hours -->
    <div class="mb-4">
        <label class="form-label fw-semibold">
            Hours
        </label>
        <input type="number"
               name="hours"
               min="1"
               max="24"
               required
               class="form-control shadow-sm"
               placeholder="Enter hours">
    </div>

    <button type="submit"
            class="btn btn-primary w-100 py-2 fw-semibold shadow-sm">
        Submit Report
    </button>

</form>
            </div>
        </div>

    </div>
</div>

{% endblock %}
