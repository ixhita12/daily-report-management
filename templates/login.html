<!DOCTYPE html>
<html>
<head>
    <title>Login | Daily Report System</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg,rgb(53, 158, 119),rgb(195, 211, 222));
            height: 100vh;
        }
        .login-card {
            background: white;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }
        .system-title {
            font-weight: 600;
        }

        
    </style>
</head>

<body class="d-flex align-items-center justify-content-center">

<div class="col-md-4">

    <div class="login-card">

        <div class="text-center mb-4">
            <h4 class="system-title">Daily Report Management System</h4>
            <small class="text-muted">MCA Final Year Project Portal</small>
        </div>

        <form action="/login" method="post">


            <div class="mb-3">
                <label class="form-label">Email Address</label>
                <input type="email" class="form-control" name="email" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" name="password" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Login As</label>
                <select class="form-select" name="role" required>
                    <option value="">Select Role</option>
                    <option value="student">Student</option>
                    <option value="admin">Admin</option>
                </select>
            </div>

            <button type="submit" class="btn btn-primary w-100">
                Login
            </button>

        </form>

    </div>

</div>

</body>
</html>
